name: Deploy to Imblob

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy build output to Imblob
        env:
          IMBLOB_API_KEY: ${{ secrets.IMBLOB_API_KEY }}
          IMBLOB_APP_NAME: PdfTools-GPT
        run: node .github/scripts/deploy-imblob.mjs
